name: Release Tag

on:
  push:
    branches:
      - release
      - release/**

permissions:
  contents: write

jobs:
  tag-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Read version from package.json
        id: version
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [[ -z "$VERSION" ]]; then
            echo "package.json version is empty" >&2
            exit 1
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "package.json version is not a valid semver-like value: $VERSION" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=release-v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create or update release tag
        env:
          TAG_NAME: ${{ steps.version.outputs.tag }}
          TARGET_SHA: ${{ github.sha }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch --tags --force

          if git rev-parse -q --verify "refs/tags/$TAG_NAME" >/dev/null; then
            CURRENT_SHA="$(git rev-list -n 1 "$TAG_NAME")"
            if [[ "$CURRENT_SHA" == "$TARGET_SHA" ]]; then
              echo "Tag $TAG_NAME already points to $TARGET_SHA"
              exit 0
            fi
          fi

          git tag -fa "$TAG_NAME" "$TARGET_SHA" -m "Release $TAG_NAME"
          git push origin "refs/tags/$TAG_NAME" --force
